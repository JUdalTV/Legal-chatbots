[pytest]
# Hiển thị đúng tiếng Việt trên Windows terminal
# pytest sẽ không escape Unicode khi dùng --no-header -p no:terminal hoặc cấu hình dưới đây

# Bật màu sắc
addopts = --tb=short

# Encoding mặc định cho file test
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
