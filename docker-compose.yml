version: '3.8'

services:
  # 1. Qdrant — Vector Database (cho Vector RAG)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_doan
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # 2. Neo4j — Graph Database (cho Graph RAG)
  neo4j:
    image: neo4j:5-community
    container_name: neo4j_doan
    ports:
      - "7474:7474"   # HTTP / Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/12345678
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    volumes:
      - ./neo4j_storage/data:/data
      - ./neo4j_storage/logs:/logs
      - ./neo4j_storage/import:/import
      - ./neo4j_storage/plugins:/plugins
    restart: unless-stopped
