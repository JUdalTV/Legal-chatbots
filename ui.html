      `;
    }

    function graphVizHtml(graphContext, articleIds) {
      const graph = parseGraphContext(graphContext, articleIds);
      if (!graph.nodes.length) {
        return `
          <div class="graph-viz is-hidden" data-graph-viz>
            <div class="graph-empty">No graph structure detected.</div>
          </div>
        `;
      }
      const layout = layoutGraph(graph.nodes, graph.edges);
      const markerId = `arrow-${genId()}`;
      const edges = graph.edges.map((edge) => {
        const from = layout.nodeMap.get(edge.from);
        const to = layout.nodeMap.get(edge.to);
        if (!from || !to) return "";
        const x1 = from.x + from.w;
        const y1 = from.y + from.h / 2;
        const x2 = to.x;
        const y2 = to.y + to.h / 2;
        const midX = (x1 + x2) / 2;
        const midY = (y1 + y2) / 2 - 6;
        return `
          <path class="graph-edge" d="M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}" marker-end="url(#${markerId})"></path>
          <text class="graph-edge-label" x="${midX}" y="${midY}" text-anchor="middle">${escapeHtml(shorten(edge.label, 24))}</text>
        `;
      }).join("");
      const nodes = layout.nodes.map((node) => {
        const lines = wrapLabel(node.label, 22, 2);
        return `
          <g class="graph-node ${escapeHtml(node.kind)}" transform="translate(${node.x} ${node.y})">
            <rect width="${node.w}" height="${node.h}"></rect>
            <text class="node-type" x="10" y="15">${escapeHtml(node.type)}</text>
            ${lines.map((line, i) => (
              `<text x="10" y="${33 + i * 14}">${escapeHtml(line)}</text>`
            )).join("")}
          </g>
        `;
      }).join("");
      return `
        <div class="graph-viz is-hidden" data-graph-viz>
          <svg viewBox="0 0 ${layout.width} ${layout.height}" role="img" aria-label="Graph context visualization">
            <defs>
              <marker id="${markerId}" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b6964"></path>
              </marker>
            </defs>
            ${edges}
            ${nodes}
          </svg>
        </div>
      `;
    }

    function parseGraphContext(value, articleIds = []) {
      const nodes = new Map();
      const edges = [];
      const blocks = String(value || "")
        .split(/\n\s*---+\s*\n/g)
        .map((b) => b.trim())
        .filter(Boolean);

      function addNode(id, label, type, kind) {
        const key = normalizeNodeId(id || label || type);
        if (!key) return null;
        if (!nodes.has(key)) {
          nodes.set(key, {
            id: key,
            label: cleanLabel(label || key),
            type: cleanLabel(type || "NODE"),
            kind: kind || nodeKind(type),
          });
        }
        return key;
      }

      function addEdge(from, to, label) {
        if (!from || !to || from === to) return;
        const key = `${from}|${label}|${to}`;
        if (edges.some((e) => e.key === key)) return;
        edges.push({ key, from, to, label: cleanLabel(label || "REL") });
      }

      blocks.forEach((block, blockIndex) => {
        const lines = block.split(/\n+/).map((l) => normalizeGraphSyntax(l).trim()).filter(Boolean);
        if (!lines.length) return;

        const first = lines[0];
        const heading = first.match(/^\[([^\]]+)\]\s*(.+)$/);
        const lawLabel = heading ? heading[1] : "LAW";
        const articleLabel = heading ? heading[2] : first;
        const articleId = articleIds[blockIndex] || articleLabel;
        const lawId = addNode(`law:${lawLabel}`, lawLabel, "LAW", "law");
        const articleNodeId = addNode(`article:${articleId}`, articleLabel, "ARTICLE", "article");
        addEdge(lawId, articleNodeId, "HAS_ARTICLE");

        for (const line of lines.slice(1)) {
          const bullet = line.match(/^(?:[-*]|\u2022|â€¢)\s*(.+)$/);
          if (bullet) {
            const body = bullet[1].trim();
            const relation = body.match(/^(.+?)\s*(?:\u2014|--|-)\s*([A-Z][A-Z0-9_]{2,})\s*(?:\u2192|->)\s*(.+?)(?:\s+\[(.+)\])?$/);
            if (relation) {
              const from = addNode(`entity:${relation[1]}`, relation[1], "ENTITY", "entity");
              const to = addNode(`entity:${relation[3]}`, relation[3], "ENTITY", "entity");
              addEdge(articleNodeId, from, "CONTEXT");
              addEdge(from, to, relation[2]);
              addEdge(to, articleNodeId, "IN_ARTICLE");
              continue;
            }

            const entityGroup = body.match(/^([A-Z][A-Z0-9_]{2,}):\s*(.+)$/);
            if (entityGroup) {
              const type = entityGroup[1];
              entityGroup[2].split(/\s*,\s*/).filter(Boolean).slice(0, 8).forEach((label) => {
                const entityId = addNode(`${type}:${label}`, label, type, "entity");
                addEdge(articleNodeId, entityId, "MENTIONS");
              });
              continue;
            }

            if (body.length > 12) {
              const clauseId = addNode(`clause:${articleId}:${body.slice(0, 80)}`, body, "CLAUSE", "clause");
              addEdge(articleNodeId, clauseId, "HAS_CLAUSE");
            }
            continue;
          }

          const refLine = line.match(/^[^:]{0,40}:\s*(.+)$/);
          if (refLine && /(?:REF|tham|chi|den|to)/i.test(stripAccents(line))) {
            refLine[1].split(/\s*,\s*/).filter(Boolean).slice(0, 8).forEach((ref) => {
              const refId = addNode(`ref:${ref}`, ref, "ARTICLE_REF", "ref");
              addEdge(articleNodeId, refId, "REFERS_TO");
            });
          }
        }
      });

      return {
        nodes: Array.from(nodes.values()).slice(0, 80),
        edges: edges.filter((edge) => nodes.has(edge.from) && nodes.has(edge.to)).slice(0, 120),
      };
    }

    function layoutGraph(nodes, edges) {
      const buckets = {
        law: [],
        article: [],
        clause: [],
        entity: [],
        ref: [],
      };
      nodes.forEach((node) => {
        const bucket = buckets[node.kind] ? node.kind : "entity";
        buckets[bucket].push(node);
      });

      const cols = [
        ["law", 28],
        ["article", 195],
        ["clause", 370],
        ["entity", 555],
        ["ref", 735],
      ];
      const maxRows = Math.max(1, ...Object.values(buckets).map((b) => b.length));
      const height = Math.max(360, 58 + maxRows * 78);
      const laidOut = [];

      cols.forEach(([kind, x]) => {
        const list = buckets[kind];
        const gap = height / (list.length + 1);
        list.forEach((node, i) => {
          laidOut.push({
            ...node,
            x,
            y: Math.max(24, Math.round(gap * (i + 1) - 30)),
            w: kind === "clause" ? 165 : 145,
            h: 58,
          });
        });
      });

      return {
        nodes: laidOut,
        nodeMap: new Map(laidOut.map((node) => [node.id, node])),
        width: 910,
        height,
      };
    }

    function normalizeNodeId(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, " ").slice(0, 160);
    }

    function cleanLabel(value) {
      return String(value || "").replace(/\s+/g, " ").trim();
    }

    function shorten(value, max) {
      const text = cleanLabel(value);
      return text.length <= max ? text : `${text.slice(0, max - 1)}...`;
    }

    function wrapLabel(value, width, maxLines) {
      const words = cleanLabel(value).split(/\s+/);
      const lines = [];
      let line = "";
      for (const word of words) {
        const next = line ? `${line} ${word}` : word;
        if (next.length > width && line) {
          lines.push(line);
          line = word;
        } else {
          line = next;
        }
        if (lines.length === maxLines) break;
      }
      if (line && lines.length < maxLines) lines.push(line);
      if (words.join(" ").length > lines.join(" ").length && lines.length) {
        lines[lines.length - 1] = shorten(lines[lines.length - 1], width);
      }
      return lines.length ? lines : [""];
    }

    function normalizeGraphSyntax(value) {
      return String(value || "")
        .replace(/\u00e2\u20ac\u00a2/g, "\u2022")
        .replace(/\u00e2\u20ac\u201d/g, "\u2014")
        .replace(/\u00e2\u2020\u2019/g, "\u2192");
    }

    function stripAccents(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase();
    }

    function nodeKind(type) {
      const t = String(type || "").toUpperCase();
      if (t.includes("LAW")) return "law";
      if (t.includes("ARTICLE_REF")) return "ref";
      if (t.includes("ARTICLE")) return "article";
      if (t.includes("CLAUSE")) return "clause";
      return "entity";
    }

    async function openNeo4jGraph(articleIds) {
      const ids = Array.from(new Set((articleIds || []).map((id) => String(id || "").trim()).filter(Boolean)));
      els.graphModal.hidden = false;
      els.graphMeta.textContent = ids.length ? ids.join(", ") : "No article ids";
      els.graphStage.innerHTML = `<div class="graph-empty">Loading Neo4j subgraph...</div>`;
      els.graphInspector.innerHTML = `
        <h3>Selection</h3>
        <p>Click a node or relationship to inspect Neo4j properties.</p>
      `;

      if (!ids.length) {
        els.graphStage.innerHTML = `<div class="graph-empty">No graph_article_ids found in this response.</div>`;
        return;
      }

      try {
        const res = await fetch(apiUrl("/api/graph/subgraph"), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ article_ids: ids, limit: 180 }),
        });
        if (!res.ok) {
          const text = await res.text();
          throw new Error(`HTTP ${res.status}: ${text.slice(0, 180)}`);
        }
        const graph = await res.json();
        renderNeo4jGraph(graph, ids);
      } catch (ex) {
        const msg = ex instanceof Error ? ex.message : String(ex);
        els.graphStage.innerHTML = `<div class="graph-empty">Cannot load Neo4j graph: ${escapeHtml(msg)}</div>`;
      }
    }

    function closeNeo4jGraph() {
      stopGraphSimulation();
      els.graphModal.hidden = true;
      els.graphStage.innerHTML = "";
      currentGraphView = { nodes: new Map(), edges: new Map() };
      graphViewport = { scale: 1, tx: 0, ty: 0 };
    }

    function renderNeo4jGraph(graph, articleIds) {
      stopGraphSimulation();
      const selectedArticles = new Set(articleIds);
      const nodes = (graph.nodes || []).map((node, index) => ({
        ...node,
        index,
        kind: neoKind(node.labels),
        r: neoRadius(node.labels),
        color: neoColor(node.labels),
        vx: 0,
        vy: 0,
        fx: null,
        fy: null,
        pinned: selectedArticles.has(node.id),
      }));
      const nodeIds = new Set(nodes.map((node) => node.id));
      const edges = (graph.edges || [])
        .filter((edge) => nodeIds.has(edge.source) && nodeIds.has(edge.target))
        .map((edge, index) => ({ ...edge, index }));

      currentGraphView = {
        nodes: new Map(nodes.map((node) => [node.id, node])),
        edges: new Map(edges.map((edge) => [edge.id, edge])),
      };

      if (!nodes.length) {
        els.graphStage.innerHTML = `<div class="graph-empty">Neo4j returned an empty subgraph.</div>`;
        return;
      }

      const stageRect = els.graphStage.getBoundingClientRect();
      const width = stageRect.width || 1200;
      const height = stageRect.height || 800;
      const cx = width / 2;
      const cy = height / 2;

      // Seed initial positions in concentric rings — pinned articles at center.
      const pinnedNodes = nodes.filter((n) => n.pinned);
      const otherNodes = nodes.filter((n) => !n.pinned);
      pinnedNodes.forEach((n, i) => {
        const a = (i / Math.max(1, pinnedNodes.length)) * Math.PI * 2;
        n.x = cx + Math.cos(a) * (pinnedNodes.length > 1 ? 70 : 0);
        n.y = cy + Math.sin(a) * (pinnedNodes.length > 1 ? 70 : 0);
        n.fx = n.x;
        n.fy = n.y;
      });
      otherNodes.forEach((n, i) => {
        const seed = hashString(n.id);
        const angle = (seed % 6283) / 1000 + i * 0.15;
        const ring = 180 + (seed % 240);
        n.x = cx + Math.cos(angle) * ring;
        n.y = cy + Math.sin(angle) * ring;
      });

      const markerId = `neo-arrow-${genId()}`;
      graphViewport = { scale: 1, tx: 0, ty: 0 };

      els.graphMeta.textContent =
        `${nodes.length} nodes, ${edges.length} relationships · ${articleIds.join(", ")}`;

      els.graphStage.innerHTML = `
        <svg class="graph-canvas-svg" preserveAspectRatio="xMidYMid meet">
          <defs>
            <marker id="${markerId}" viewBox="0 0 10 10" refX="9" refY="5"
                    markerWidth="6" markerHeight="6" orient="auto">
              <path class="neo-marker" d="M 0 0 L 10 5 L 0 10 z"></path>
            </marker>
          </defs>
          <g class="graph-canvas" data-canvas></g>
        </svg>
        <div class="graph-legend">
          <h4>NODE TYPES</h4>
          <ul>${buildLegendItems(nodes)}</ul>
        </div>
        <div class="graph-hint">
          ☉ Kéo node để di chuyển (node sẽ ở yên tại vị trí mới)<br/>
          Scroll = zoom &nbsp;·&nbsp; Double-click = thả node về simulation &nbsp;·&nbsp; ⟲ = revert
        </div>
        <div class="graph-zoom-controls">
          <button class="graph-zoom-btn" data-zoom="in" type="button" title="Zoom in">+</button>
          <button class="graph-zoom-btn" data-zoom="out" type="button" title="Zoom out">−</button>
          <button class="graph-zoom-btn" data-zoom="revert" type="button"
                  title="Revert (đưa về trạng thái ban đầu)" style="font-size:14px;">⟲</button>
        </div>
      `;

      const svg = els.graphStage.querySelector("svg.graph-canvas-svg");
      const canvas = els.graphStage.querySelector("[data-canvas]");
      const nodeEls = new Map();
      const edgeEls = new Map();

      // Build edge groups
      edges.forEach((edge) => {
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "neo-edge-group");
        g.setAttribute("data-edge-id", edge.id);
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("class", "neo-edge");
        line.setAttribute("marker-end", `url(#${markerId})`);
        const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
        label.setAttribute("class", "neo-edge-label");
        label.setAttribute("text-anchor", "middle");
        label.textContent = shorten(edge.type, 26);
        g.appendChild(line);
        g.appendChild(label);
        canvas.appendChild(g);
        edgeEls.set(edge.id, { line, label });
      });

      // Build node groups — dark translucent body w/ radial center glow + vivid ring + outer halo
      nodes.forEach((node) => {
        const labels = Array.isArray(node.labels) ? node.labels : [];
        const type = labels[0] || "NODE";
        const titleLines = wrapLabel(node.label || node.id, 12, 2);
        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
        g.setAttribute("class", "neo-node" + (node.pinned ? " pinned" : ""));
        g.setAttribute("data-node-id", node.id);

        const safeId = escapeAttr(node.id);
        const haloGradId = `halo-${safeId}`;
        const bodyGradId = `body-${safeId}`;
        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        defs.innerHTML = `
          <radialGradient id="${haloGradId}" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="${node.color}" stop-opacity="0.85"/>
            <stop offset="55%"  stop-color="${node.color}" stop-opacity="0.30"/>
            <stop offset="100%" stop-color="${node.color}" stop-opacity="0"/>
          </radialGradient>
          <radialGradient id="${bodyGradId}" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="${node.color}" stop-opacity="0.55"/>
            <stop offset="55%"  stop-color="${node.color}" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="${node.color}" stop-opacity="0.05"/>
          </radialGradient>
        `;
        g.appendChild(defs);

        // Outer halo glow
        const halo = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        halo.setAttribute("class", "neo-halo");
        halo.setAttribute("r", node.r + 14);
        halo.setAttribute("fill", `url(#${haloGradId})`);
        g.appendChild(halo);

        // Bubble body: radial gradient (darker outer, brighter center) + vivid ring
        const body = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        body.setAttribute("class", "neo-body");
        body.setAttribute("r", node.r);
        body.setAttribute("fill", `url(#${bodyGradId})`);
        body.setAttribute("stroke", node.color);
        g.appendChild(body);

        // Title text inside bubble (uppercase, white, stroked for legibility)
        titleLines.forEach((line, i) => {
          const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
          t.setAttribute("class", "neo-title");
          const totalLines = titleLines.length;
          const baseY = -((totalLines - 1) * 6) + i * 13;
          t.setAttribute("y", baseY.toFixed(1));
          t.textContent = line;
          g.appendChild(t);
        });

        // Type label under bubble
        const typeLabel = document.createElementNS("http://www.w3.org/2000/svg", "text");
        typeLabel.setAttribute("class", "neo-label-type");
        typeLabel.setAttribute("y", (node.r + 16).toFixed(1));
        typeLabel.textContent = shorten(type, 16);
        g.appendChild(typeLabel);

        // Snapshot initial state for revert
        node.initialX = node.x;
        node.initialY = node.y;
        node.originallyPinned = node.pinned;

        canvas.appendChild(g);
        nodeEls.set(node.id, g);
      });

      // ── Simulation (live force-directed) ─────────────────────────
      let alpha = 1;
      const REPULSION = 1200;
      const SPRING_LEN = 170;
      const SPRING_K = 0.04;
      const GRAVITY = 0.012;
      const DAMPING = 0.78;

      function tick() {
        // Repulsion
        for (let i = 0; i < nodes.length; i++) {
          const a = nodes[i];
          for (let j = i + 1; j < nodes.length; j++) {
            const b = nodes[j];
            let dx = a.x - b.x;
            let dy = a.y - b.y;
            let d2 = dx * dx + dy * dy;
            if (d2 < 1) {
              dx = (Math.random() - 0.5) * 2;
              dy = (Math.random() - 0.5) * 2;
              d2 = dx * dx + dy * dy + 0.01;
            }
            const minDist = a.r + b.r + 40;
            const force = Math.min(40, (REPULSION + minDist * minDist) / d2) * alpha;
            const d = Math.sqrt(d2);
            const fx = (dx / d) * force;
            const fy = (dy / d) * force;
            a.vx += fx;
            a.vy += fy;
            b.vx -= fx;
            b.vy -= fy;
          }
        }
        // Spring (edges)
        edges.forEach((edge) => {
          const a = currentGraphView.nodes.get(edge.source);
          const b = currentGraphView.nodes.get(edge.target);
          if (!a || !b) return;
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const d = Math.max(1, Math.sqrt(dx * dx + dy * dy));
          const pull = (d - SPRING_LEN) * SPRING_K * alpha;
          const fx = (dx / d) * pull;
          const fy = (dy / d) * pull;
          a.vx += fx;
          a.vy += fy;
          b.vx -= fx;
          b.vy -= fy;
        });
        // Gravity to center
        nodes.forEach((n) => {
          n.vx += (cx - n.x) * GRAVITY * alpha;
          n.vy += (cy - n.y) * GRAVITY * alpha;
        });
        // Apply
        nodes.forEach((n) => {
          if (n.fx != null) {
            n.x = n.fx;
            n.y = n.fy;
            n.vx = 0;
            n.vy = 0;
            return;
          }
          n.vx *= DAMPING;
          n.vy *= DAMPING;
          n.x += n.vx;
          n.y += n.vy;
        });

        // Paint
        edges.forEach((edge) => {
          const ref = edgeEls.get(edge.id);
          const a = currentGraphView.nodes.get(edge.source);
          const b = currentGraphView.nodes.get(edge.target);
          if (!ref || !a || !b) return;
          const angle = Math.atan2(b.y - a.y, b.x - a.x);
          const x1 = a.x + Math.cos(angle) * a.r;
          const y1 = a.y + Math.sin(angle) * a.r;
          const x2 = b.x - Math.cos(angle) * (b.r + 6);
          const y2 = b.y - Math.sin(angle) * (b.r + 6);
          ref.line.setAttribute("x1", x1.toFixed(1));
          ref.line.setAttribute("y1", y1.toFixed(1));
          ref.line.setAttribute("x2", x2.toFixed(1));
          ref.line.setAttribute("y2", y2.toFixed(1));
          ref.label.setAttribute("x", ((x1 + x2) / 2).toFixed(1));
          ref.label.setAttribute("y", ((y1 + y2) / 2 - 5).toFixed(1));
        });
        nodes.forEach((n) => {
          const el = nodeEls.get(n.id);
          if (el) el.setAttribute("transform", `translate(${n.x.toFixed(2)} ${n.y.toFixed(2)})`);
        });

        alpha *= 0.992;
        if (alpha > 0.005) {
          graphSimHandle = requestAnimationFrame(tick);
        } else {
          graphSimHandle = null;
        }
      }
      function reheat() {
        alpha = Math.max(alpha, 0.45);
        if (!graphSimHandle) graphSimHandle = requestAnimationFrame(tick);
      }
      graphSimHandle = requestAnimationFrame(tick);

      // ── Viewport transform (zoom/pan) ────────────────────────────
      function applyViewport() {
        canvas.setAttribute(
          "transform",
          `translate(${graphViewport.tx} ${graphViewport.ty}) scale(${graphViewport.scale})`,
        );
      }
      function svgPoint(evt) {
        const rect = svg.getBoundingClientRect();
        return {
          x: (evt.clientX - rect.left - graphViewport.tx) / graphViewport.scale,
          y: (evt.clientY - rect.top - graphViewport.ty) / graphViewport.scale,
        };
      }
      function zoomAround(mx, my, newScale) {
        newScale = Math.max(0.25, Math.min(3, newScale));
        const k = newScale / graphViewport.scale;
        graphViewport.tx = mx - (mx - graphViewport.tx) * k;
        graphViewport.ty = my - (my - graphViewport.ty) * k;
        graphViewport.scale = newScale;
        applyViewport();
      }
      applyViewport();

      // Wheel zoom
      svg.addEventListener("wheel", (event) => {
        event.preventDefault();
        const rect = svg.getBoundingClientRect();
        const mx = event.clientX - rect.left;
        const my = event.clientY - rect.top;
        const factor = event.deltaY < 0 ? 1.12 : 1 / 1.12;
        zoomAround(mx, my, graphViewport.scale * factor);
      }, { passive: false });

      // Revert: reset viewport + restore node positions to initial layout
      function revertGraph() {
        graphViewport = { scale: 1, tx: 0, ty: 0 };
        applyViewport();
        nodes.forEach((n) => {
          n.x = n.initialX;
          n.y = n.initialY;
          n.vx = 0;
          n.vy = 0;
          n.dropped = false;
          n.pinned = n.originallyPinned;
          if (n.pinned) {
            n.fx = n.initialX;
            n.fy = n.initialY;
          } else {
            n.fx = null;
            n.fy = null;
          }
          const el = nodeEls.get(n.id);
          if (el) {
            el.classList.toggle("pinned", n.pinned);
            el.classList.remove("dropped", "dragging");
          }
        });
        alpha = 1;
        reheat();
      }

      // Zoom-button handlers
      els.graphStage.querySelectorAll("[data-zoom]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const rect = svg.getBoundingClientRect();
          const mx = rect.width / 2;
          const my = rect.height / 2;
          const mode = btn.dataset.zoom;
          if (mode === "in") zoomAround(mx, my, graphViewport.scale * 1.25);
          else if (mode === "out") zoomAround(mx, my, graphViewport.scale / 1.25);
          else if (mode === "revert") revertGraph();
        });
      });

      // Drag (node move) + pan (empty area)
      let dragNode = null;
      let dragOffset = null;
      let panStart = null;
      let movedDuringPress = false;

      svg.addEventListener("mousedown", (event) => {
        if (event.button !== 0) return;
        movedDuringPress = false;
        const nodeEl = event.target.closest("[data-node-id]");
        if (nodeEl) {
          const node = currentGraphView.nodes.get(nodeEl.dataset.nodeId);
          if (!node) return;
          dragNode = node;
          nodeEl.classList.add("dragging");
          const p = svgPoint(event);
          dragOffset = { x: node.x - p.x, y: node.y - p.y };
          node.fx = node.x;
          node.fy = node.y;
          event.preventDefault();
        } else {
          panStart = {
            x: event.clientX - graphViewport.tx,
            y: event.clientY - graphViewport.ty,
          };
          els.graphStage.classList.add("panning");
        }
      });
      window.addEventListener("mousemove", (event) => {
        if (dragNode) {
          movedDuringPress = true;
          const p = svgPoint(event);
          dragNode.fx = p.x + dragOffset.x;
          dragNode.fy = p.y + dragOffset.y;
          dragNode.x = dragNode.fx;
          dragNode.y = dragNode.fy;
          reheat();
        } else if (panStart) {
          movedDuringPress = true;
          graphViewport.tx = event.clientX - panStart.x;
          graphViewport.ty = event.clientY - panStart.y;
          applyViewport();
        }
      });
      window.addEventListener("mouseup", () => {
        if (dragNode) {
          const el = nodeEls.get(dragNode.id);
          if (el) el.classList.remove("dragging");
          if (movedDuringPress) {
            // User actually dragged the node — lock it where they dropped it.
            dragNode.fx = dragNode.x;
            dragNode.fy = dragNode.y;
            dragNode.dropped = true;
            if (el) el.classList.add("dropped");
            graphSuppressClick = true;
            setTimeout(() => { graphSuppressClick = false; }, 0);
          } else if (!dragNode.pinned) {
            // Clean click without movement — release the temporary fix
            dragNode.fx = null;
            dragNode.fy = null;
          }
          dragNode = null;
          dragOffset = null;
        }
        if (panStart) {
          panStart = null;
          els.graphStage.classList.remove("panning");
          if (movedDuringPress) {
            graphSuppressClick = true;
            setTimeout(() => { graphSuppressClick = false; }, 0);
          }
        }
      });

      // Double-click — releases a dragged/pinned node back into the simulation,
      // or pins a free node where it currently sits.
      svg.addEventListener("dblclick", (event) => {
        const nodeEl = event.target.closest("[data-node-id]");
        if (!nodeEl) return;
        const node = currentGraphView.nodes.get(nodeEl.dataset.nodeId);
        if (!node) return;
        const isFixed = node.fx != null;
        if (isFixed) {
          node.fx = null;
          node.fy = null;
          node.pinned = false;
          node.dropped = false;
          nodeEl.classList.remove("pinned", "dropped");
        } else {
          node.fx = node.x;
          node.fy = node.y;
          node.pinned = true;
          nodeEl.classList.add("pinned");
        }
        reheat();
        event.preventDefault();
      });
    }

    function stopGraphSimulation() {
      if (graphSimHandle) {
        cancelAnimationFrame(graphSimHandle);
        graphSimHandle = null;
      }
    }

    function buildLegendItems(nodes) {
      const seen = new Map();
      nodes.forEach((n) => {
        const t = (Array.isArray(n.labels) && n.labels[0]) || "NODE";
        if (!seen.has(t)) seen.set(t, n.color);
      });
      const entries = Array.from(seen.entries()).slice(0, 10);
      return entries
        .map(([type, color]) => {
          const style =
            `background:${hexToRgba(color, 0.28)};` +
            `border:1.6px solid ${color};` +
            `box-shadow:0 0 8px ${hexToRgba(color, 0.55)};`;
          return `<li><span class="legend-dot" style="${style}"></span>${escapeHtml(type)}</li>`;
        })
        .join("");
    }

    function escapeAttr(value) {
      return String(value || "").replace(/[^a-zA-Z0-9_-]/g, "_");
    }

    function hexToRgba(hex, alpha) {
      const s = String(hex || "").replace("#", "");
      if (s.length !== 6) return `rgba(255,255,255,${alpha})`;
      const r = parseInt(s.slice(0, 2), 16);
      const g = parseInt(s.slice(2, 4), 16);
      const b = parseInt(s.slice(4, 6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function neoKind(labels) {
      const set = new Set(Array.isArray(labels) ? labels : []);
      if (set.has("LAW")) return "law";
      if (set.has("CHAPTER")) return "chapter";
      if (set.has("ARTICLE")) return "article";
      if (set.has("CLAUSE")) return "clause";
      return "entity";
    }

    function neoRadius(labels) {
      const kind = neoKind(labels);
      if (kind === "article") return 38;
      if (kind === "law" || kind === "chapter") return 34;
      if (kind === "clause") return 30;
      return 28;
    }

    function neoColor(labels) {
      const kind = neoKind(labels);
      if (kind === "law") return "#9b7cf2";
      if (kind === "chapter") return "#5b9bd5";
      if (kind === "article") return "#e88a5a";
      if (kind === "clause") return "#5fa872";
      const first = (Array.isArray(labels) && labels[0]) || "";
      const palette = [
        "#5b9bd5", // blue
        "#e88a5a", // orange
        "#e35b6b", // red
        "#a571d3", // purple
        "#d4a14a", // yellow
        "#4ac17b", // green
        "#3fb9b0", // teal
        "#c46d8f", // pink
        "#7a8fc2", // blue-grey
        "#b89055", // bronze
      ];
      return palette[hashString(first) % palette.length];
    }

    function hashString(value) {
      let h = 2166136261;
      const text = String(value || "");
      for (let i = 0; i < text.length; i += 1) {
        h ^= text.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function showGraphInspector(kind, item) {
      const title = kind === "edge" ? item.type : (item.label || item.id);
      const subtitle = kind === "edge"
        ? `${item.source} -> ${item.target}`
        : (Array.isArray(item.labels) ? item.labels.join(", ") : "NODE");
      const props = kind === "edge"
        ? { type: item.type, source: item.source, target: item.target, ...(item.properties || {}) }
        : { id: item.id, labels: item.labels || [], ...(item.properties || {}) };
      els.graphInspector.innerHTML = `
        <h3>${escapeHtml(title)}</h3>
        <p>${escapeHtml(subtitle)}</p>
        <div class="graph-props">
          ${Object.entries(props).map(([key, value]) => `
            <div class="graph-prop">
              <div class="graph-prop-key">${escapeHtml(key)}</div>
              <div class="graph-prop-value">${escapeHtml(formatProp(value))}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function formatProp(value) {
      if (Array.isArray(value)) return value.join(", ");
      if (value && typeof value === "object") return JSON.stringify(value);
      return String(value ?? "");
    }

    let pendingPatchMsg = null;
    let patchScheduled = false;
    let patchTimer = 0;
    let patchFrame = 0;
    let lastPatchAt = 0;
    const STREAM_PATCH_INTERVAL_MS = 40;

    function patchStreamingMessage(m) {
      pendingPatchMsg = m;
      if (patchScheduled) return;
      patchScheduled = true;

      const now = performance.now();
      const delay = Math.max(0, STREAM_PATCH_INTERVAL_MS - (now - lastPatchAt));
      patchTimer = window.setTimeout(() => {
        patchTimer = 0;
        patchFrame = requestAnimationFrame(() => {
          patchFrame = 0;
          flushStreamingPatch();
        });
      }, delay);
    }

    function flushStreamingPatch() {
      if (patchTimer) {
        clearTimeout(patchTimer);
        patchTimer = 0;
      }
      if (patchFrame) {
        cancelAnimationFrame(patchFrame);
        patchFrame = 0;
      }
      if (!patchScheduled && !pendingPatchMsg) return;
      patchScheduled = false;
      lastPatchAt = performance.now();
      const msg = pendingPatchMsg;
      pendingPatchMsg = null;
      if (msg) applyStreamingPatch(msg);
    }

    function cancelStreamingPatch() {
      if (patchTimer) {
        clearTimeout(patchTimer);
        patchTimer = 0;
      }
      if (patchFrame) {
        cancelAnimationFrame(patchFrame);
        patchFrame = 0;
      }
      pendingPatchMsg = null;
      patchScheduled = false;
    }

    function applyStreamingPatch(m) {
      const root = document.querySelector(`[data-msg-id="${m.id}"]`);
      if (!root) { render(); return; }

      // Thinking card live update (only if scaffold already exists)
      const thinkBody = root.querySelector(".think-body");
      if (thinkBody) {
        const wasAtBottom =
          thinkBody.scrollHeight - thinkBody.scrollTop - thinkBody.clientHeight < 16;
        appendTextDiff(thinkBody, m.thinking || "");
        if (wasAtBottom) thinkBody.scrollTop = thinkBody.scrollHeight;
      }
      const thinkLen = root.querySelector(".think-len");
      if (thinkLen) thinkLen.textContent = `${(m.thinking || "").length.toLocaleString()} ký tự`;

      // Answer content live update — replace, keep caret
      const liveMarkdown = root.querySelector("[data-live-md]");
      if (liveMarkdown) {
        updateStreamingMarkdown(liveMarkdown, m.answer || "", !!m.streaming);
      } else {
        const content = root.querySelector(".msg-content");
        if (content) {
          if (m.streaming) {
            content.classList.add("markdown", "streaming-markdown");
            content.setAttribute("data-live-md", "");
            content.innerHTML = renderStreamingMarkdown(m.answer || "", true);
          } else {
            const html = renderMarkdown(m.answer || "");
            if (content.innerHTML !== html) content.innerHTML = html;
          }
        }
      }

      scheduleScrollSync();
    }

    function appendTextDiff(el, nextText) {
      const current = el.textContent || "";
      const currentLength = Number(el.dataset.textLength || current.length || "0");
      if (nextText.length >= currentLength && nextText.startsWith(current)) {
        const delta = nextText.slice(currentLength);
        if (delta) el.append(document.createTextNode(delta));
      } else if (current !== nextText) {
        el.textContent = nextText;
      }
      el.dataset.textLength = String(nextText.length);
    }

    function smoothTextTo(el, nextText) {
      el._smoothTarget = nextText;
      if (el._smoothFrame) return;

      const step = () => {
        el._smoothFrame = 0;
        if (!el.isConnected) return;

        const target = String(el._smoothTarget || "");
        let current = el.textContent || "";
        if (!target.startsWith(current)) {
          el.textContent = target;
          el.dataset.textLength = String(target.length);
          return;
        }

        const remaining = target.length - current.length;
        if (remaining <= 0) {
          el.dataset.textLength = String(target.length);
          return;
        }

        const take = Math.min(remaining, Math.max(6, Math.min(48, Math.ceil(remaining / 5))));
        el.append(document.createTextNode(target.slice(current.length, current.length + take)));
        el.dataset.textLength = String(current.length + take);
        scheduleScrollSync();

        if ((el.textContent || "").length < target.length) {
          el._smoothFrame = requestAnimationFrame(step);
        }
      };

      el._smoothFrame = requestAnimationFrame(step);
    }

    function updateComposer() {
      els.sendBtn.disabled = !els.input.value.trim() || state.sending;
      const law = state.laws.find((l) => l.id === state.lawId);
      els.composerHint.textContent = `${state.lawId ? `Đang lọc theo: ${law?.label || state.lawId}` : "Tất cả luật"} · thinking=${state.thinking} · context=${state.showContext ? "on" : "off"}`;
    }

    function autoGrowTextarea() {
      els.input.style.height = "auto";
      els.input.style.height = Math.min(els.input.scrollHeight, 220) + "px";
    }

    async function loadLaws() {
      try {
        const res = await fetch(apiUrl("/api/laws"));
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        state.laws = Array.isArray(data) ? data : [];
      } catch (_) {
        state.laws = [];
      }
      render();
    }

    async function send(raw) {
      const query = String(raw ?? els.input.value).trim();
      if (!query || state.sending) return;

      els.input.value = "";
      state.sending = true;
      state.stuckToBottom = true;
      autoGrowTextarea();

      // Push user message + streaming placeholder assistant message
      const placeholder = {
        id: genId(),
        role: "assistant",
        answer: "",
        thinking: "",
        refined: null,
        intent: "",
        thinking_used: false,
        streaming: true,
        context: undefined,
      };
      updateActive((c) => ({
        ...c,
        title: c.messages.length === 0 ? truncate(query, 40) : c.title,
        messages: [
          ...c.messages,
          { role: "user", text: query },
          placeholder,
        ],
      }));

      // Find the live placeholder reference inside state
      const findPlaceholder = () => {
        const conv = activeConversation();
        return conv?.messages.find((m) => m.id === placeholder.id);
      };
      const replacePlaceholderWithError = (msg) => {
        updateActive((c) => {
          const msgs = c.messages.slice();
          for (let i = msgs.length - 1; i >= 0; i--) {
            if (msgs[i].role === "assistant" && msgs[i].id === placeholder.id) {
              msgs[i] = { role: "error", text: `Lỗi: ${msg}` };
              break;
            }
          }
          return { ...c, messages: msgs };
        });
      };

      let hadThinking = false;
      let hadAnswer = false;
      let serverError = null;

      try {
        const res = await fetch(apiUrl("/api/chat/stream"), {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Accept": "text/event-stream",
          },
          body: JSON.stringify({
            query,
            law_id: state.lawId || null,
            thinking_mode: state.thinking,
            include_context: state.showContext,
          }),
        });
        if (!res.ok || !res.body) {
          const errText = res.body ? await res.text() : "";
          throw new Error(`HTTP ${res.status}: ${errText.slice(0, 200)}`);
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let buffer = "";

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let sep;
          while ((sep = buffer.indexOf("\n\n")) !== -1) {
            const rawEvent = buffer.slice(0, sep);
            buffer = buffer.slice(sep + 2);
            const lines = rawEvent
              .split("\n")
              .map((l) => l.trim())
              .filter((l) => l.startsWith("data:"))
              .map((l) => l.slice(5).trim());
            if (lines.length === 0) continue;
            const dataStr = lines.join("");
            if (!dataStr) continue;
            let evt;
            try { evt = JSON.parse(dataStr); } catch { continue; }

            // Mutate the placeholder object in state directly.
            const p = findPlaceholder();
            if (!p) continue;

            if (evt.type === "meta") {
              p.refined = evt.refined;
              p.intent = evt.intent;
              p.thinking_used = !!evt.thinking_used;
              if (state.showContext) {
                p.context = {
                  vector_context: evt.vector_context,
                  graph_context: evt.graph_context,
                  graph_article_ids: evt.graph_article_ids,
                };
              }
              render();
            } else if (evt.type === "thinking") {
              p.thinking += evt.delta || "";
              if (!hadThinking) {
                hadThinking = true;
                render();             // first time → render scaffold
              } else {
                patchStreamingMessage(p);
              }
            } else if (evt.type === "answer") {
              p.answer += evt.delta || "";
              if (!hadAnswer) {
                hadAnswer = true;
                render();             // first time → switch typing → content
              } else {
                patchStreamingMessage(p);
              }
            } else if (evt.type === "done") {
              cancelStreamingPatch();
              if (typeof evt.answer === "string") p.answer = evt.answer;
              if (typeof evt.thinking === "string") p.thinking = evt.thinking;
              p.streaming = false;
              render();
            } else if (evt.type === "error") {
              cancelStreamingPatch();
              serverError = evt.message || "Unknown error";
            }
          }
        }

        if (serverError) {
          replacePlaceholderWithError(serverError);
        } else {
          const p = findPlaceholder();
          if (p && p.streaming) {
            p.streaming = false;
            render();
          }
        }
      } catch (ex) {
        cancelStreamingPatch();
        const msg = ex instanceof Error ? ex.message : String(ex);
        replacePlaceholderWithError(msg);
      } finally {
        state.sending = false;
        updateComposer();
      }
    }

    function applyTheme(theme) {
      state.theme = theme === "light" ? "light" : "dark";
      document.documentElement.dataset.theme = state.theme;
      localStorage.setItem("legal-chat-theme", state.theme);
      els.themeBtn.title = state.theme === "dark" ? "Chuyển sang chế độ sáng" : "Chuyển sang chế độ tối";
    }
    applyTheme(state.theme);

    function startInlineRename(target, currentValue, onCommit) {
      const input = document.createElement("input");
      input.type = "text";
      input.className = target.classList.contains("chat-title") ? "chat-title-input" : "conv-item-input";
      input.value = currentValue;
      target.replaceWith(input);
      input.focus();
      input.select();
      let done = false;
      const restore = () => {
        if (input.parentNode) input.replaceWith(target);
      };
      const commit = (save) => {
        if (done) return;
        done = true;
        const next = input.value.trim();
        input.removeEventListener("blur", onBlur);
        restore();
        if (save && next && next !== currentValue) onCommit(next);
        else render();
      };
      const onBlur = () => commit(true);
      input.addEventListener("blur", onBlur);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); commit(true); }
        else if (e.key === "Escape") { e.preventDefault(); commit(false); }
        e.stopPropagation();
      });
    }

    function renameConversation(id) {
      const conv = state.conversations.find((c) => c.id === id);
      if (!conv) return;
      const titleEl = document.querySelector(`[data-conv-id="${CSS.escape(id)}"] .conv-item-title`);
      if (!titleEl) return;
      startInlineRename(titleEl, conv.title, (next) => {
        conv.title = next;
        render();
      });
    }

    els.themeBtn.addEventListener("click", () => {
      applyTheme(state.theme === "dark" ? "light" : "dark");
    });

    els.chatTitle.addEventListener("dblclick", () => {
      const active = activeConversation();
      if (!active) return;
      startInlineRename(els.chatTitle, active.title, (next) => {
        active.title = next;
        render();
      });
    });

    els.chat.addEventListener("scroll", () => {
      const distance = els.chat.scrollHeight - els.chat.scrollTop - els.chat.clientHeight;
      state.stuckToBottom = distance < 40;
      els.scrollBottomBtn.classList.toggle("visible", distance > 80);
    });

    els.scrollBottomBtn.addEventListener("click", () => {
      state.stuckToBottom = true;
      els.chat.scrollTop = els.chat.scrollHeight;
      els.scrollBottomBtn.classList.remove("visible");
    });

    els.newChatBtn.addEventListener("click", () => {
      const c = newConversation();
      state.conversations = [c, ...state.conversations];
      state.activeId = c.id;
      state.stuckToBottom = true;
      els.input.value = "";
      render();
    });

    els.convList.addEventListener("click", (event) => {
      const renameBtn = event.target.closest("[data-rename-id]");
      if (renameBtn) {
        event.stopPropagation();
        renameConversation(renameBtn.dataset.renameId);
        return;
      }

      const deleteBtn = event.target.closest("[data-delete-id]");
      if (deleteBtn) {
        const id = deleteBtn.dataset.deleteId;
        const next = state.conversations.filter((c) => c.id !== id);
        if (!next.length) {
          const fresh = newConversation();
          state.conversations = [fresh];
          state.activeId = fresh.id;
        } else {
          state.conversations = next;
          if (state.activeId === id) state.activeId = next[0].id;
        }
        render();
        return;
      }

      const item = event.target.closest("[data-conv-id]");
      if (item) {
        state.activeId = item.dataset.convId;
        state.stuckToBottom = true;
        render();
      }
    });

    els.convList.addEventListener("dblclick", (event) => {
      const titleEl = event.target.closest(".conv-item-title");
      if (!titleEl) return;
      const item = titleEl.closest("[data-conv-id]");
      if (item) renameConversation(item.dataset.convId);
    });

    els.chatInner.addEventListener("click", (event) => {
      const suggestion = event.target.closest("[data-suggestion]");
      if (suggestion) send(suggestion.dataset.suggestion);

      const graphOpen = event.target.closest("[data-graph-open]");
      if (graphOpen) {
        const ids = String(graphOpen.dataset.graphOpen || "")
          .split("|")
          .map((id) => id.trim())
          .filter(Boolean);
        openNeo4jGraph(ids);
      }
    });

    els.graphClose.addEventListener("click", closeNeo4jGraph);

    els.graphModal.addEventListener("click", (event) => {
      if (event.target === els.graphModal) closeNeo4jGraph();
    });

    els.graphStage.addEventListener("click", (event) => {
      if (graphSuppressClick) return;
      const nodeEl = event.target.closest("[data-node-id]");
      if (nodeEl) {
        const node = currentGraphView.nodes.get(nodeEl.dataset.nodeId);
        if (node) showGraphInspector("node", node);
        return;
      }
      const edgeEl = event.target.closest("[data-edge-id]");
      if (edgeEl) {
        const edge = currentGraphView.edges.get(edgeEl.dataset.edgeId);
        if (edge) showGraphInspector("edge", edge);
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !els.graphModal.hidden) closeNeo4jGraph();
    });

    els.thinkingBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        state.thinking = btn.dataset.thinking;
        render();
      });
    });

    els.contextBtn.addEventListener("click", () => {
      state.showContext = !state.showContext;
      render();
    });

    els.lawSelect.addEventListener("change", () => {
      state.lawId = els.lawSelect.value;
      render();
    });

    els.apiBase.addEventListener("change", () => {
      state.apiBase = els.apiBase.value.trim() || "http://localhost:8000";
      els.apiBase.value = state.apiBase;
      localStorage.setItem("legal-chat-api-base", state.apiBase);
      loadLaws();
    });

    els.input.addEventListener("input", () => {
      autoGrowTextarea();
      updateComposer();
    });

    els.input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        send();
      }
    });

    els.sendBtn.addEventListener("click", () => send());

    render();
    loadLaws();
  </script>
</body>
</html>
