<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal Chat</title>
  <style>
    :root {
      --bg: #1f1f1e;
      --bg-elevated: #262624;
      --bg-sidebar: #181817;
      --bg-input: #2a2a28;
      --bg-bubble-user: #353532;
      --bg-code: #1a1a19;
      --text: #e8e6e3;
      --text-muted: #a1a09c;
      --text-faint: #7a7975;
      --border: #3a3937;
      --border-soft: #2e2d2b;
      --accent: #d97757;
      --accent-hover: #c46444;
      --accent-soft: rgba(217, 119, 87, 0.12);
      --danger: #e06c75;
      --graph-backdrop: rgba(0, 0, 0, 0.68);
      --graph-stage-bg: radial-gradient(ellipse at center, #232322 0%, #131312 100%);
      --graph-edge: rgba(180, 178, 173, 0.42);
      --graph-edge-label: rgba(220, 218, 213, 0.55);
      --graph-edge-label-stroke: rgba(20, 20, 20, 0.85);
      --graph-node-title: #ffffff;
      --graph-node-title-stroke: rgba(0, 0, 0, 0.55);
      --graph-node-type: rgba(220, 220, 220, 0.62);
      --graph-node-type-stroke: rgba(20, 20, 20, 0.7);
      --graph-floating-bg: rgba(20, 20, 20, 0.78);
      --graph-zoom-bg: rgba(28, 28, 26, 0.85);
      --graph-zoom-hover-bg: rgba(50, 50, 48, 0.9);
      --graph-marker: rgba(180, 178, 173, 0.55);
      --graph-dropped-shadow: rgba(255, 255, 255, 0.18);
      --sans: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --serif: "Source Serif Pro", Georgia, "Times New Roman", serif;
      --mono: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      color-scheme: dark;
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    :root[data-theme="light"] {
      --bg: #faf9f7;
      --bg-elevated: #f1efea;
      --bg-sidebar: #f5f3ee;
      --bg-input: #ffffff;
      --bg-bubble-user: #ebe8e1;
      --bg-code: #f3f0e8;
      --text: #2a2826;
      --text-muted: #5a5854;
      --text-faint: #8a8884;
      --border: #cfccc5;
      --border-soft: #e2dfd8;
      --accent: #c25e3c;
      --accent-hover: #a84a2b;
      --accent-soft: rgba(194, 94, 60, 0.12);
      --danger: #c44d56;
      --graph-backdrop: rgba(34, 30, 24, 0.32);
      --graph-stage-bg: radial-gradient(ellipse at center, #fbf8f1 0%, #e9e4d8 100%);
      --graph-edge: rgba(88, 83, 75, 0.42);
      --graph-edge-label: rgba(64, 59, 52, 0.72);
      --graph-edge-label-stroke: rgba(250, 248, 244, 0.9);
      --graph-node-title: #2a2826;
      --graph-node-title-stroke: rgba(255, 255, 255, 0.68);
      --graph-node-type: rgba(58, 54, 49, 0.72);
      --graph-node-type-stroke: rgba(255, 255, 255, 0.72);
      --graph-floating-bg: rgba(255, 252, 246, 0.82);
      --graph-zoom-bg: rgba(255, 252, 246, 0.9);
      --graph-zoom-hover-bg: rgba(241, 237, 229, 0.96);
      --graph-marker: rgba(88, 83, 75, 0.58);
      --graph-dropped-shadow: rgba(80, 72, 62, 0.18);
      color-scheme: light;
    }
    :root[data-theme="light"] ::-webkit-scrollbar-thumb { background: #cfccc5; }
    :root[data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: #b6b2aa; }
    :root[data-theme="light"] .send-btn { color: #ffffff; }
    :root[data-theme="light"] .sidebar-logo { color: #ffffff; }
    :root[data-theme="light"] .neo-edge-label,
    :root[data-theme="light"] .neo-node text.neo-title,
    :root[data-theme="light"] .neo-node .neo-label-type { paint-order: stroke; }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; width: 100%; }
    button {
      font-family: inherit;
      color: inherit;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
    }
    input, textarea, select {
      font-family: inherit;
      font-size: inherit;
      color: inherit;
      background: none;
      border: none;
      outline: none;
    }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a4946; }

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 8px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 6px 14px;
      border-bottom: 1px solid var(--border-soft);
    }

    .sidebar-logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 14px;
    }

    .sidebar-title {
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      border: 1px solid var(--border);
      transition: background 0.15s;
    }
    .new-chat-btn:hover { background: var(--bg-elevated); }

    .conv-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-faint);
      padding: 12px 8px 6px;
    }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 8px;
    }

    .conv-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: left;
    }
    .conv-item:hover, .conv-item.active {
      background: var(--bg-elevated);
      color: var(--text);
    }
    .conv-item-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .conv-item-del {
      opacity: 0;
      font-size: 16px;
      color: var(--text-faint);
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity 0.15s;
    }
    .conv-item:hover .conv-item-del { opacity: 1; }
    .conv-item-del:hover {
      color: var(--danger);
      background: rgba(224, 108, 117, 0.12);
    }
    .conv-item-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .conv-item:hover .conv-item-actions { opacity: 1; }
    .conv-item-action {
      font-size: 13px;
      color: var(--text-faint);
      padding: 3px 5px;
      border-radius: 4px;
      line-height: 1;
    }
    .conv-item-action:hover {
      color: var(--text);
      background: var(--border-soft);
    }
    .conv-item-action.del:hover {
      color: var(--danger);
      background: rgba(224, 108, 117, 0.12);
    }
    .conv-item-input {
      flex: 1;
      min-width: 0;
      padding: 2px 6px;
      border-radius: 5px;
      background: var(--bg-input);
      border: 1px solid var(--accent);
      color: var(--text);
      font-size: 13.5px;
      font-family: inherit;
      outline: none;
    }
    .chat-title.editable { cursor: text; }
    .chat-title-input {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      background: var(--bg-input);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 2px 8px;
      min-width: 140px;
      font-family: inherit;
      outline: none;
    }
    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--bg-elevated);
      border: 1px solid var(--border-soft);
      color: var(--text-muted);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .icon-btn:hover {
      color: var(--text);
      border-color: var(--border);
    }
    .icon-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sidebar-footer {
      border-top: 1px solid var(--border-soft);
      padding: 10px 8px;
      font-size: 12px;
      color: var(--text-faint);
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border-soft);
      gap: 12px;
      flex-wrap: wrap;
    }
    .topbar-left, .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chat-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      padding: 4px;
    }
    .control-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-faint);
      padding: 0 6px;
    }
    .control-btn {
      padding: 5px 10px;
      border-radius: 7px;
      font-size: 12.5px;
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .control-btn:hover { color: var(--text); }
    .control-btn.active {
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
    }
    .select, .api-input {
      background: var(--bg-elevated);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text);
    }
    .select {
      padding-right: 30px;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a1a09c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: right 8px center;
      background-size: 14px;
      cursor: pointer;
      max-width: 260px;
    }
    .api-input {
      width: 190px;
    }
    .select:hover, .api-input:hover { border-color: var(--border); }

    .chat-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .chat {
      flex: 1;
      overflow-y: auto;
      overflow-anchor: none;
      scroll-behavior: auto;
      display: flex;
      flex-direction: column;
    }
    .scroll-bottom-btn {
      position: absolute;
      right: 24px;
      bottom: 20px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: grid;
      place-items: center;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.28);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 0.18s, transform 0.18s, color 0.15s, border-color 0.15s;
      z-index: 5;
    }
    .scroll-bottom-btn.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .scroll-bottom-btn:hover { color: var(--text); border-color: var(--accent); }
    .scroll-bottom-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .chat-inner {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      flex: 1;
    }
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      padding: 60px 20px;
      text-align: center;
    }
    .empty-state h2 {
      font-family: var(--serif);
      font-size: 28px;
      font-weight: 400;
      color: var(--text);
      margin: 0;
    }
    .empty-state p {
      font-size: 14px;
      margin: 0;
      max-width: 460px;
    }
    .suggestion-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 20px;
      width: 100%;
      max-width: 560px;
    }
    .suggestion {
      text-align: left;
      padding: 12px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.45;
      transition: all 0.15s;
    }
    .suggestion:hover {
      border-color: var(--border);
      color: var(--text);
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .msg-role {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-faint);
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0.2px;
    }
    .badge.muted {
      background: var(--bg-elevated);
      color: var(--text-muted);
    }
    .msg-content {
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--text);
    }
    .msg.user {
      align-items: flex-end;
    }
    .msg.user .msg-content {
      background: var(--bg-bubble-user);
      padding: 12px 16px;
      border-radius: 14px;
      align-self: flex-end;
      max-width: 85%;
    }
    .msg.assistant .msg-content {
      padding: 4px 0;
    }
    .msg.assistant .msg-content.markdown {
      white-space: normal;
    }
    .msg.assistant .msg-content.streaming-markdown {
      white-space: normal;
    }
    .streaming-markdown .live-md-done:empty,
    .streaming-markdown .live-md-tail:empty {
      display: none;
    }
    .markdown h1,
    .markdown h2,
    .markdown h3 {
      margin: 14px 0 8px;
      color: var(--text);
      line-height: 1.3;
      font-weight: 650;
    }
    .markdown h1 { font-size: 22px; }
    .markdown h2 { font-size: 19px; }
    .markdown h3 { font-size: 16px; }
    .markdown p { margin: 0 0 10px; }
    .markdown ul,
    .markdown ol {
      margin: 6px 0 12px;
      padding-left: 24px;
    }
    .markdown li {
      margin: 4px 0;
      padding-left: 2px;
    }
    .markdown blockquote {
      margin: 8px 0 12px;
      padding: 8px 12px;
      border-left: 3px solid var(--accent);
      background: var(--bg-elevated);
      color: var(--text-muted);
      border-radius: 0 8px 8px 0;
    }
    .markdown code {
      font-family: var(--mono);
      font-size: 0.92em;
      background: var(--bg-code);
      border: 1px solid var(--border-soft);
      border-radius: 5px;
      padding: 1px 5px;
    }
    .markdown pre {
      margin: 8px 0 12px;
      padding: 10px 12px;
      background: var(--bg-code);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre;
    }
    .markdown pre code {
      padding: 0;
      border: none;
      background: transparent;
      font-size: 12px;
      line-height: 1.55;
    }
    .markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0 14px;
      font-size: 14px;
    }
    .markdown th,
    .markdown td {
      border: 1px solid var(--border-soft);
      padding: 7px 9px;
      vertical-align: top;
    }
    .markdown th {
      background: var(--bg-elevated);
      color: var(--text);
      text-align: left;
      font-weight: 600;
    }
    .markdown a {
      color: var(--accent);
      text-decoration: none;
    }
    .markdown a:hover { text-decoration: underline; }
    .markdown hr {
      border: none;
      border-top: 1px solid var(--border-soft);
      margin: 14px 0;
    }
    .msg.error .msg-content {
      color: var(--danger);
      background: rgba(224, 108, 117, 0.08);
      border: 1px solid rgba(224, 108, 117, 0.2);
      padding: 12px 16px;
      border-radius: 12px;
    }
    .msg-meta {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 4px;
      font-style: italic;
    }

    .ctx {
      margin-top: 10px;
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      background: var(--bg-elevated);
      overflow: hidden;
    }
    .ctx-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .ctx-summary:hover { color: var(--text); }
    .ctx[open] .chev { transform: rotate(90deg); }
    .chev {
      transition: transform 0.15s;
      font-size: 10px;
    }
    .ctx-body {
      padding: 0 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ctx-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ctx-section h4 {
      margin: 0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-faint);
    }
    .ctx-section pre {
      margin: 0;
      background: var(--bg-code);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 320px;
      overflow-y: auto;
    }
    .ctx-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .ctx-action {
      padding: 4px 8px;
      border: 1px solid var(--border-soft);
      border-radius: 7px;
      background: var(--bg-code);
      color: var(--text-muted);
      font-size: 11.5px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .ctx-action:hover,
    .ctx-action.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .graph-viz {
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--bg-code);
      overflow: auto;
      max-height: 480px;
    }
    .graph-viz.is-hidden { display: none; }
    .graph-viz svg {
      display: block;
      min-width: 760px;
      width: 100%;
      height: auto;
    }
    .graph-edge {
      stroke: #6b6964;
      stroke-width: 1.2;
      fill: none;
      opacity: 0.78;
    }
    .graph-edge-label {
      font-family: var(--mono);
      font-size: 10px;
      fill: var(--text-faint);
      paint-order: stroke;
      stroke: var(--bg-code);
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .graph-node rect {
      stroke: var(--border);
      stroke-width: 1;
      rx: 7;
      ry: 7;
    }
    .graph-node text {
      font-family: var(--sans);
      font-size: 11.5px;
      fill: var(--text);
      pointer-events: none;
    }
    .graph-node .node-type {
      font-family: var(--mono);
      font-size: 9.5px;
      fill: var(--text-faint);
      text-transform: uppercase;
    }
    .graph-node.law rect { fill: #28332d; }
    .graph-node.article rect { fill: #37302a; stroke: var(--accent); }
    .graph-node.clause rect { fill: #2c2f34; }
    .graph-node.ref rect { fill: #302d38; }
    .graph-node.entity rect { fill: #262f30; }
    .graph-empty {
      padding: 12px;
      font-size: 12px;
      color: var(--text-faint);
    }
    .graph-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--graph-backdrop);
      display: grid;
      place-items: center;
      padding: 22px;
    }
    .graph-modal[hidden] { display: none; }
    .graph-panel {
      width: min(1500px, 96vw);
      height: min(940px, 92vh);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.48);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }
    .graph-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-soft);
      background: var(--bg-sidebar);
    }
    .graph-modal-title {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .graph-modal-title strong {
      font-size: 14px;
      color: var(--text);
    }
    .graph-modal-title span {
      font-size: 12px;
      color: var(--text-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .graph-close {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      border: 1px solid var(--border-soft);
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-size: 20px;
      line-height: 1;
    }
    .graph-close:hover {
      color: var(--text);
      border-color: var(--border);
    }
    .graph-modal-body {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
    }
    .graph-stage {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: var(--graph-stage-bg);
      cursor: grab;
    }
    .graph-stage.panning { cursor: grabbing; }
    .graph-stage svg.graph-canvas-svg {
      display: block;
      width: 100%;
      height: 100%;
      user-select: none;
    }
    .neo-edge {
      stroke: var(--graph-edge);
      stroke-width: 1.3;
      opacity: 0.95;
      cursor: pointer;
      transition: stroke 0.12s;
    }
    .neo-edge-group:hover .neo-edge { stroke: var(--accent); }
    .neo-edge-group:hover .neo-edge-label { fill: var(--text); opacity: 1; }
    .neo-marker { fill: var(--graph-marker); }
    .neo-edge-label {
      font-family: var(--mono);
      font-size: 9.5px;
      fill: var(--graph-edge-label);
      paint-order: stroke;
      stroke: var(--graph-edge-label-stroke);
      stroke-width: 3px;
      stroke-linejoin: round;
      pointer-events: none;
      letter-spacing: 0.3px;
    }
    .neo-node { cursor: grab; }
    .neo-node.dragging { cursor: grabbing; }
    .neo-node .neo-halo {
      opacity: 0.18;
      pointer-events: none;
      transition: opacity 0.18s, r 0.18s;
    }
    .neo-node:hover .neo-halo { opacity: 0.34; }
    .neo-node.dragging .neo-halo,
    .neo-node.pinned .neo-halo { opacity: 0.42; }
    .neo-node circle.neo-body {
      stroke-width: 2.4;
      transition: stroke-width 0.12s;
    }
    .neo-node:hover circle.neo-body { stroke-width: 3; }
    .neo-node.pinned circle.neo-body {
      stroke-dasharray: 5 4;
      stroke-width: 2.4;
    }
    .neo-node.dropped circle.neo-body {
      stroke-width: 2.8;
      filter: drop-shadow(0 0 6px var(--graph-dropped-shadow));
    }
    .neo-node.dragging circle.neo-body {
      stroke-width: 3.4;
    }
    .neo-node text.neo-title {
      fill: var(--graph-node-title);
      font-family: var(--sans);
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-anchor: middle;
      pointer-events: none;
      text-transform: uppercase;
      paint-order: stroke;
      stroke: var(--graph-node-title-stroke);
      stroke-width: 2.2px;
      stroke-linejoin: round;
    }
    .neo-node .neo-label-type {
      fill: var(--graph-node-type);
      font-family: var(--mono);
      font-size: 8.5px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      text-anchor: middle;
      pointer-events: none;
      paint-order: stroke;
      stroke: var(--graph-node-type-stroke);
      stroke-width: 2.5px;
      stroke-linejoin: round;
    }

    .graph-legend {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 2;
      background: var(--graph-floating-bg);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 11.5px;
      color: var(--text);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: none;
      user-select: none;
      max-width: 200px;
    }
    .graph-legend h4 {
      margin: 0 0 8px;
      font-size: 10px;
      letter-spacing: 1.6px;
      color: var(--text-faint);
      font-weight: 600;
    }
    .graph-legend ul {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
    }
    .graph-legend li {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .graph-legend .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.4),
                  inset 0 0 0 1px rgba(255, 255, 255, 0.15);
      flex-shrink: 0;
    }

    .graph-hint {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      background: var(--graph-floating-bg);
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.55;
      text-align: right;
      pointer-events: none;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      max-width: 280px;
    }

    .graph-zoom-controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .graph-zoom-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--graph-zoom-bg);
      border: 1px solid var(--border-soft);
      color: var(--text-muted);
      font-size: 18px;
      line-height: 1;
      display: grid;
      place-items: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .graph-zoom-btn:hover {
      color: var(--text);
      border-color: var(--border);
      background: var(--graph-zoom-hover-bg);
    }
    .graph-inspector {
      border-left: 1px solid var(--border-soft);
      background: var(--bg-elevated);
      min-width: 0;
      overflow: auto;
      padding: 14px;
    }
    .graph-inspector h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--text);
    }
    .graph-inspector p {
      margin: 0 0 10px;
      color: var(--text-muted);
      font-size: 12px;
    }
    .graph-props {
      display: grid;
      gap: 7px;
      font-size: 12px;
    }
    .graph-prop {
      display: grid;
      gap: 2px;
      padding-bottom: 7px;
      border-bottom: 1px solid var(--border-soft);
    }
    .graph-prop-key {
      color: var(--text-faint);
      font-family: var(--mono);
      font-size: 10.5px;
    }
    .graph-prop-value {
      color: var(--text-muted);
      word-break: break-word;
    }

    .typing {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 8px 0;
    }
    .typing .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-faint);
      animation: blink 1.2s infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: 0.2s; }
    .typing .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; }
      40% { opacity: 1; }
    }

    /* Thinking card */
    .think {
      margin-top: 8px;
      margin-bottom: 4px;
      border: 1px solid var(--border-soft);
      border-radius: 12px;
      background: linear-gradient(
        180deg,
        rgba(217, 119, 87, 0.04) 0%,
        rgba(217, 119, 87, 0.01) 100%
      );
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .think:hover { border-color: var(--border); }
    .think[open] { background: var(--bg-elevated); }
    .think-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      font-size: 12.5px;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      list-style: none;
    }
    .think-summary::-webkit-details-marker { display: none; }
    .think-summary:hover { color: var(--text); }
    .think-icon { font-size: 13px; display: inline-flex; }
    .think-label { font-weight: 500; color: var(--text); }
    .think-len {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-faint);
      margin-left: 2px;
    }
    .think-summary .chev { margin-left: auto; color: var(--text-faint); }
    .think[open] .think-summary .chev { transform: rotate(90deg); }
    .think-body {
      padding: 10px 14px 12px 36px;
      font-family: var(--mono);
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text-muted);
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 360px;
      overflow-y: auto;
      border-top: 1px solid var(--border-soft);
    }
    .think[open] > .think-body {
      animation: think-pulse 1.6s ease-in-out infinite;
    }
    @keyframes think-pulse {
      0%, 100% { opacity: 0.85; }
      50% { opacity: 1; }
    }

    /* Streaming caret */
    .caret {
      display: inline-block;
      width: 7px;
      height: 1em;
      margin-left: 2px;
      background: var(--accent);
      vertical-align: text-bottom;
      border-radius: 1px;
      animation: caret-blink 1s steps(2, start) infinite;
    }
    @keyframes caret-blink {
      to { visibility: hidden; }
    }

    .composer-wrap {
      padding: 12px 24px 20px;
      border-top: 1px solid var(--border-soft);
      background: var(--bg);
    }
    .composer {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--bg-input);
      border: 1px solid var(--border-soft);
      border-radius: 16px;
      padding: 10px 10px 10px 14px;
      transition: border-color 0.15s;
    }
    .composer:focus-within { border-color: var(--border); }
    .composer textarea {
      flex: 1;
      resize: none;
      min-height: 24px;
      max-height: 220px;
      padding: 4px 0;
      background: transparent;
      font-size: 15px;
      line-height: 1.5;
      color: var(--text);
    }
    .composer textarea::placeholder { color: var(--text-faint); }
    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      display: grid;
      place-items: center;
      font-size: 16px;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .send-btn:disabled {
      background: var(--border);
      color: var(--text-faint);
      cursor: not-allowed;
    }
    .composer-hint {
      max-width: 760px;
      margin: 6px auto 0;
      font-size: 11px;
      color: var(--text-faint);
      text-align: center;
    }

    @media (max-width: 760px) {
      .sidebar { display: none; }
      .topbar { padding: 10px 14px; }
      .chat-inner { padding: 18px 14px; }
      .composer-wrap { padding: 10px 14px 16px; }
      .suggestion-grid { grid-template-columns: 1fr; }
      .api-input { width: 100%; }
      .graph-modal { padding: 8px; }
      .graph-panel { width: 100vw; height: 100vh; border-radius: 0; }
      .graph-modal-body { grid-template-columns: 1fr; grid-template-rows: 1fr 220px; }
      .graph-inspector { border-left: none; border-top: 1px solid var(--border-soft); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">L</div>
        <div class="sidebar-title">Legal Chat</div>
      </div>

      <button id="newChatBtn" class="new-chat-btn">
        <span>+</span>
        <span>Cuộc trò chuyện mới</span>
      </button>

      <div class="conv-section-title">Lịch sử</div>
      <div id="convList" class="conv-list"></div>

      <div class="sidebar-footer">Hybrid RAG · Vector + Graph · LLM thinking</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div id="chatTitle" class="chat-title editable" title="Double-click để đổi tên">New chat</div>
        </div>
        <div class="topbar-right">
          <button id="themeBtn" class="icon-btn" type="button" title="Đổi chế độ sáng/tối">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          </button>
          <input id="apiBase" class="api-input" title="API backend base URL" />

          <select id="lawSelect" class="select" title="Lọc theo luật">
            <option value="">Tất cả luật</option>
          </select>

          <div class="control-group" title="Chế độ suy luận của LLM">
            <span class="control-label">Thinking</span>
            <button class="control-btn active" data-thinking="auto">auto</button>
            <button class="control-btn" data-thinking="on">on</button>
            <button class="control-btn" data-thinking="off">off</button>
          </div>

          <div class="control-group" title="Hiển thị Vector/Graph context">
            <span class="control-label">Context</span>
            <button id="contextBtn" class="control-btn">off</button>
          </div>
        </div>
      </header>

      <div class="chat-wrap">
        <div id="chat" class="chat">
          <div id="chatInner" class="chat-inner"></div>
        </div>
        <button id="scrollBottomBtn" class="scroll-bottom-btn" type="button" title="Cuộn xuống dưới">
          <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
      </div>

      <div class="composer-wrap">
        <div class="composer">
          <textarea
            id="input"
            placeholder="Nhập câu hỏi pháp lý... (Enter để gửi, Shift+Enter để xuống dòng)"
            rows="1"
          ></textarea>
          <button id="sendBtn" class="send-btn" title="Gửi" disabled>↑</button>
        </div>
        <div id="composerHint" class="composer-hint">Tất cả luật · thinking=auto · context=off</div>
      </div>
    </main>
  </div>

  <div id="graphModal" class="graph-modal" hidden>
    <div class="graph-panel">
      <div class="graph-modal-header">
        <div class="graph-modal-title">
          <strong>Neo4j subgraph</strong>
          <span id="graphMeta">No graph loaded</span>
        </div>
        <button id="graphClose" class="graph-close" type="button" title="Đóng">×</button>
      </div>
      <div class="graph-modal-body">
        <div id="graphStage" class="graph-stage"></div>
        <aside id="graphInspector" class="graph-inspector">
          <h3>Selection</h3>
          <p>Click a node or relationship to inspect Neo4j properties.</p>
        </aside>
      </div>
    </div>
  </div>

  <script>
    const SUGGESTIONS = [
      "Điều 15 Luật An ninh mạng 2025 quy định gì?",
      "Phân biệt lỗ hổng bảo mật và sự cố an ninh mạng theo Luật.",
      "Doanh nghiệp viễn thông có nghĩa vụ gì khi đại lý đăng ký SIM sai thông tin?",
      "So sánh Luật CNTT 2006 và Luật CNTT 2025 về điều kiện kinh doanh.",
    ];

    const state = {
      conversations: [newConversation()],
      activeId: null,
      laws: [],
      lawId: "",
      thinking: "auto",
      showContext: false,
      input: "",
      sending: false,
      apiBase: localStorage.getItem("legal-chat-api-base") || "http://localhost:8000",
      theme: localStorage.getItem("legal-chat-theme") || "dark",
      stuckToBottom: true,
    };
    state.activeId = state.conversations[0].id;
    document.documentElement.dataset.theme = state.theme;
    let currentGraphView = { nodes: new Map(), edges: new Map() };
    let graphSimHandle = null;
    let graphViewport = { scale: 1, tx: 0, ty: 0 };
    let graphSuppressClick = false;

    const els = {
      convList: document.getElementById("convList"),
      chatTitle: document.getElementById("chatTitle"),
      chat: document.getElementById("chat"),
      chatInner: document.getElementById("chatInner"),
      input: document.getElementById("input"),
      sendBtn: document.getElementById("sendBtn"),
      newChatBtn: document.getElementById("newChatBtn"),
      lawSelect: document.getElementById("lawSelect"),
      contextBtn: document.getElementById("contextBtn"),
      composerHint: document.getElementById("composerHint"),
      apiBase: document.getElementById("apiBase"),
      graphModal: document.getElementById("graphModal"),
      graphMeta: document.getElementById("graphMeta"),
      graphStage: document.getElementById("graphStage"),
      graphInspector: document.getElementById("graphInspector"),
      graphClose: document.getElementById("graphClose"),
      thinkingBtns: Array.from(document.querySelectorAll("[data-thinking]")),
      themeBtn: document.getElementById("themeBtn"),
      scrollBottomBtn: document.getElementById("scrollBottomBtn"),
    };

    els.apiBase.value = state.apiBase;

    function genId() {
      return `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
    }

    function newConversation() {
      return {
        id: genId(),
        title: "New chat",
        messages: [],
        createdAt: Date.now(),
      };
    }

    function activeConversation() {
      return state.conversations.find((c) => c.id === state.activeId) || state.conversations[0];
    }

    function truncate(s, n) {
      const t = String(s || "").trim().replace(/\s+/g, " ");
      return t.length <= n ? t : t.slice(0, n - 1) + "...";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderMarkdown(value) {
      const source = String(value ?? "").replace(/\r\n?/g, "\n");
      const codeBlocks = [];
      let text = source.replace(/```([\w-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        const token = `@@CODEBLOCK_${codeBlocks.length}@@`;
        codeBlocks.push(
          `<pre><code${lang ? ` data-lang="${escapeHtml(lang)}"` : ""}>${escapeHtml(code.trimEnd())}</code></pre>`
        );
        return `\n${token}\n`;
      });

      text = escapeHtml(text);
      text = renderMarkdownTables(text);
      text = text
        .replace(/^######\s+(.+)$/gm, "<h3>$1</h3>")
        .replace(/^#####\s+(.+)$/gm, "<h3>$1</h3>")
        .replace(/^####\s+(.+)$/gm, "<h3>$1</h3>")
        .replace(/^###\s+(.+)$/gm, "<h3>$1</h3>")
        .replace(/^##\s+(.+)$/gm, "<h2>$1</h2>")
        .replace(/^#\s+(.+)$/gm, "<h1>$1</h1>")
        .replace(/^\s*---+\s*$/gm, "<hr>")
        .replace(/`([^`\n]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*\n][\s\S]*?)\*\*/g, "<strong>$1</strong>")
        .replace(/__([^_\n][\s\S]*?)__/g, "<strong>$1</strong>")
        .replace(/(^|[\s(])\*([^*\n]+)\*/g, "$1<em>$2</em>")
        .replace(/(^|[\s(])_([^_\n]+)_/g, "$1<em>$2</em>")
        .replace(/\[([^\]\n]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

      text = renderMarkdownLists(text);
      text = renderBlockquotes(text);
      text = text.replace(/@@CODEBLOCK_(\d+)@@/g, (_, i) => codeBlocks[Number(i)] || "");
      return renderParagraphs(text);
    }

    function renderMarkdownTables(text) {
      const lines = text.split("\n");
      const out = [];
      for (let i = 0; i < lines.length; i += 1) {
        if (
          i + 1 < lines.length &&
          /^\s*\|(.+)\|\s*$/.test(lines[i]) &&
          /^\s*\|?[\s:|-]+\|[\s:|.-]*\|?\s*$/.test(lines[i + 1])
        ) {
          const header = splitTableRow(lines[i]);
          i += 2;
          const rows = [];
          while (i < lines.length && /^\s*\|(.+)\|\s*$/.test(lines[i])) {
            rows.push(splitTableRow(lines[i]));
            i += 1;
          }
          i -= 1;
          out.push(
            "<table><thead><tr>" +
            header.map((c) => `<th>${c}</th>`).join("") +
            "</tr></thead><tbody>" +
            rows.map((r) => "<tr>" + r.map((c) => `<td>${c}</td>`).join("") + "</tr>").join("") +
            "</tbody></table>"
          );
        } else {
          out.push(lines[i]);
        }
      }
      return out.join("\n");
    }

    function splitTableRow(line) {
      return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map((c) => c.trim());
    }

    function renderMarkdownLists(text) {
      const lines = text.split("\n");
      const out = [];
      let listType = null;
      let items = [];

      function flush() {
        if (!listType) return;
        out.push(`<${listType}>${items.map((item) => `<li>${item}</li>`).join("")}</${listType}>`);
        listType = null;
        items = [];
      }

      for (const line of lines) {
        const unordered = line.match(/^\s*[-*]\s+(.+)$/);
        const ordered = line.match(/^\s*\d+\.\s+(.+)$/);
        if (unordered || ordered) {
          const nextType = unordered ? "ul" : "ol";
          if (listType && listType !== nextType) flush();
          listType = nextType;
          items.push((unordered || ordered)[1]);
        } else {
          flush();
          out.push(line);
        }
      }
      flush();
      return out.join("\n");
    }

    function renderBlockquotes(text) {
      const lines = text.split("\n");
      const out = [];
      let quote = [];

      function flush() {
        if (!quote.length) return;
        out.push(`<blockquote>${quote.join("<br>")}</blockquote>`);
        quote = [];
      }

      for (const line of lines) {
        const m = line.match(/^\s*&gt;\s?(.*)$/);
        if (m) {
          quote.push(m[1]);
        } else {
          flush();
          out.push(line);
        }
      }
      flush();
      return out.join("\n");
    }

    function renderParagraphs(text) {
      const blockStart = /^(<h[1-3]|<ul|<ol|<blockquote|<pre|<table|<hr)/;
      return text
        .split(/\n{2,}/)
        .map((block) => block.trim())
        .filter(Boolean)
        .map((block) => {
          if (blockStart.test(block)) return block;
          return `<p>${block.replace(/\n/g, "<br>")}</p>`;
        })
        .join("");
    }

    function renderStreamingMarkdown(value, showCaret = true) {
      const parts = splitStreamingMarkdown(value);
      return `
        <div class="live-md-done" data-done-len="${parts.done.length}">${parts.done ? renderMarkdown(parts.done) : ""}</div>
        <div class="live-md-tail">${parts.tail ? renderMarkdown(parts.tail) : ""}</div>
        ${showCaret ? '<span class="caret"></span>' : ""}
      `;
    }

    function updateStreamingMarkdown(el, value, showCaret = true) {
      const parts = splitStreamingMarkdown(value);
      let done = el.querySelector(".live-md-done");
      let tail = el.querySelector(".live-md-tail");
      if (!done || !tail) {
        el.innerHTML = renderStreamingMarkdown(value, showCaret);
        return;
      }

      const doneLen = Number(done.dataset.doneLen || "0");
      if (doneLen !== parts.done.length) {
        done.innerHTML = parts.done ? renderMarkdown(parts.done) : "";
        done.dataset.doneLen = String(parts.done.length);
      }

      const tailHtml = parts.tail ? renderMarkdown(parts.tail) : "";
      if (tail._tailSource !== parts.tail) {
        tail.innerHTML = tailHtml;
        tail._tailSource = parts.tail;
      }

      const hasCaret = !!el.querySelector(":scope > .caret");
      if (showCaret && !hasCaret) {
        el.insertAdjacentHTML("beforeend", '<span class="caret"></span>');
      } else if (!showCaret && hasCaret) {
        el.querySelector(":scope > .caret")?.remove();
      }
    }

    function splitStreamingMarkdown(value) {
      const text = String(value ?? "").replace(/\r\n?/g, "\n");
      if (!text) return { done: "", tail: "" };

      let boundary = text.lastIndexOf("\n\n");
      if (boundary !== -1) {
        boundary += 2;
      } else if (text.length > 1600) {
        const stable = text.slice(0, Math.max(0, text.length - 320));
        boundary = Math.max(
          stable.lastIndexOf(". "),
          stable.lastIndexOf(".\n"),
          stable.lastIndexOf("; "),
          stable.lastIndexOf(": "),
        );
        if (boundary !== -1) boundary += 1;
      }

      if (boundary <= 0) return { done: "", tail: text };
      return {
        done: text.slice(0, boundary).trimEnd(),
        tail: text.slice(boundary).replace(/^\n+/, ""),
      };
    }

    function apiUrl(path) {
      return state.apiBase.replace(/\/+$/, "") + path;
    }

    function updateActive(fn) {
      state.conversations = state.conversations.map((c) => (

    function renderMessages() {

    function messageHtml(m) {
      if (m.role === "user") {
        return `
          <div class="msg user">
            <div class="msg-role">Bạn</div>
            <div class="msg-content">${escapeHtml(m.text)}</div>
          </div>

      if (m.role === "error") {
        return `
          <div class="msg error">
            <div class="msg-role">Lỗi</div>
            <div class="msg-content">${escapeHtml(m.text)}</div>
          </div>
        `;
      }

      const refined = m.refined || {};
      const original = String(refined.original || "").trim();
      const refinedText = String(refined.refined || "").trim();
      const refinedChanged = refinedText && refinedText !== original;
      const hasContext = m.context && (m.context.vector_context || m.context.graph_context);
      const hasThinking = m.thinking && m.thinking.length > 0;
      const showThinkingLive = m.streaming && hasThinking && !m.answer;
      const showTypingDots = m.streaming && !m.answer && !hasThinking;
      const showCaret = m.streaming && m.answer;
      const answerHtml = m.streaming
        ? `<div class="msg-content markdown streaming-markdown" data-live-md>${renderStreamingMarkdown(m.answer || "", showCaret)}</div>`
        : `<div class="msg-content markdown">${renderMarkdown(m.answer || "")}</div>`;

      return `
        <div class="msg assistant" data-msg-id="${escapeHtml(m.id || "")}">
          <div class="msg-role">
            Trợ lý
            ${m.intent ? `<span class="badge">${escapeHtml(m.intent)}</span>` : ""}
            ${m.refined ? `<span class="badge ${m.thinking_used ? "" : "muted"}">${m.thinking_used ? "thinking" : "no-thinking"}</span>` : ""}
          </div>
          ${refinedChanged ? `<div class="msg-meta">↻ refined: ${escapeHtml(refinedText)}</div>` : ""}
          ${refined.objective ? `<div class="msg-meta">🎯 mục tiêu: ${escapeHtml(refined.objective)}</div>` : ""}
          ${hasThinking ? thinkHtml(m, showThinkingLive) : ""}
          ${showTypingDots
            ? `<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`
            : answerHtml
          }
          ${hasContext ? contextHtml(m.context) : ""}
        </div>
      `;
    }

    function thinkHtml(m, openByDefault) {
      const liveLabel = m.streaming && !m.answer;
      return `
        <details class="think"${openByDefault ? " open" : ""}>
          <summary class="think-summary">
            <span class="think-icon">${liveLabel ? "✨" : "💭"}</span>
            <span class="think-label">${liveLabel ? "Đang suy nghĩ…" : "Suy nghĩ"}</span>
            <span class="think-len">${(m.thinking || "").length.toLocaleString()} ký tự</span>
            <span class="chev">▸</span>

    function contextHtml(context) {
      const ids = Array.isArray(context.graph_article_ids) ? context.graph_article_ids : [];
      return `
        <details class="ctx">
          <summary class="ctx-summary">
            <span>Xem context retrieval</span>

          </summary>
          <div class="ctx-body">
            ${context.vector_context ? `
              <div class="ctx-section">
                <h4>VECTOR_CHUNKS</h4>

              </div>
            ` : ""}
            ${context.graph_context ? `
              <div class="ctx-section">
                <div class="ctx-head">
                  <h4>GRAPH_CONTEXT</h4>
                  <button class="ctx-action" type="button" data-graph-open="${escapeHtml(ids.join("|"))}">
                    Open Neo4j graph
                  </button>
                </div>
                <pre>${escapeHtml(context.graph_context)}</pre>
              </div>
            ` : ""}
            ${ids.length ? `
              <div class="ctx-section">
                <h4>GRAPH_ARTICLE_IDS</h4>
                <pre>${escapeHtml(ids.join(", "))}</pre>
              </div>
            ` : ""}
